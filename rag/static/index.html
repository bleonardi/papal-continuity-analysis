<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papal Continuity — Chat with the Corpus</title>
<style>
  :root { --bg: #f7f5f0; --ink: #2b2620; --accent: #8a3324; --line: #ddd6c9; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Georgia, "Source Serif 4", serif; background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; height: 100vh;
  }
  header { padding: 1.2rem 1.5rem 0.8rem; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 1.3rem; margin: 0 0 0.2rem; }
  header p { margin: 0; font-size: 0.85rem; color: #6b6355; }
  #tradition-filter { font-family: inherit; font-size: 0.8rem; margin-top: 0.5rem; }
  #log { flex: 1; overflow-y: auto; padding: 1.2rem 1.5rem; max-width: 780px; margin: 0 auto; width: 100%; }
  .msg { margin-bottom: 1.4rem; }
  .msg .role { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: #8a8272; margin-bottom: 0.2rem; }
  .msg.user .role { color: var(--accent); }
  .msg .body { line-height: 1.55; white-space: pre-wrap; }
  .sources { margin-top: 0.6rem; font-size: 0.8rem; color: #5c5647; }
  .sources details summary { cursor: pointer; color: #8a8272; }
  .source-item { margin: 0.4rem 0 0.4rem 1rem; padding-left: 0.6rem; border-left: 2px solid var(--line); }
  .source-item a { color: var(--accent); }
  form { display: flex; gap: 0.6rem; padding: 1rem 1.5rem; border-top: 1px solid var(--line); max-width: 780px; margin: 0 auto; width: 100%; }
  input[type=text] { flex: 1; padding: 0.6rem 0.8rem; font-family: inherit; font-size: 1rem; border: 1px solid var(--line); border-radius: 4px; }
  button { padding: 0.6rem 1.2rem; font-family: inherit; font-size: 1rem; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  .error { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Chat with the Papal Continuity Corpus</h1>
  <p>Retrieval-augmented Q&amp;A over Catholic, Anglican, Orthodox, Southern Baptist, and USCCB statements — every answer is grounded in cited excerpts.</p>
  <select id="tradition-filter">
    <option value="">All traditions</option>
    <option value="catholic">Catholic</option>
    <option value="anglican">Anglican</option>
    <option value="orthodox">Orthodox</option>
    <option value="sbc">Southern Baptist</option>
    <option value="usccb">USCCB</option>
  </select>
</header>
<div id="log"></div>
<form id="chat-form">
  <input type="text" id="question" placeholder="e.g. How did Catholic and Anglican statements on religious liberty diverge after 1960?" autocomplete="off">
  <button type="submit" id="send-btn">Ask</button>
</form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('chat-form');
const input = document.getElementById('question');
const sendBtn = document.getElementById('send-btn');
const traditionFilter = document.getElementById('tradition-filter');

function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="role">${role}</div><div class="body">${html}</div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function renderSources(sources) {
  if (!sources || sources.length === 0) return '';
  const items = sources.map(s => {
    const link = s.url ? `<a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>` : s.title;
    return `<div class="source-item"><strong>${s.tradition}${s.year ? ', ' + s.year : ''}</strong> — ${link}<br><em>"${s.snippet.replace(/</g, '&lt;')}..."</em></div>`;
  }).join('');
  return `<div class="sources"><details><summary>${sources.length} source${sources.length > 1 ? 's' : ''}</summary>${items}</details></div>`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  addMessage('user', question.replace(/</g, '&lt;'));
  input.value = '';
  sendBtn.disabled = true;
  const assistantDiv = addMessage('assistant', '<em>thinking…</em>');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        tradition: traditionFilter.value || null,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'request failed');

    assistantDiv.querySelector('.body').innerHTML =
      data.answer.replace(/</g, '&lt;').replace(/\n/g, '<br>') + renderSources(data.sources);
  } catch (err) {
    assistantDiv.querySelector('.body').innerHTML = `<span class="error">Error: ${err.message}</span>`;
  } finally {
    sendBtn.disabled = false;
    log.scrollTop = log.scrollHeight;
  }
});
</script>
</body>
</html>
