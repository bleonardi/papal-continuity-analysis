project:
  type: website
  output-dir: docs
  # rag-chat.qmd is a Shiny document (server: shiny) — it needs a live R
  # process and can't be rendered into the static site; it's deployed
  # separately to shinyapps.io (see rag/README.md).
  render:
    - "*.qmd"
    - "!rag-chat.qmd"

website:
  title: "Papal Continuity Analysis"
  navbar:
    left:
      - href: index.qmd
        text: Analysis
      - href: https://bleonardi.shinyapps.io/papal-rag-chat/
        text: Chat with the Corpus

format:
  html:
    theme: [flatly, assets/custom.scss]
    toc: true
    toc-depth: 3
    linestretch: 1.6
    code-fold: true
    highlight-style: github
    df-print: kable
    page-layout: article
